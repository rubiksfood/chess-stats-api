services:
  db:
    image: postgres:16
    container_name: chess_stats_db
    environment:
      POSTGRES_DB: chess_stats
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess
    ports:
      - "5432:5432"
    volumes:
      - chess_stats_pgdata:/var/lib/postgresql/data
volumes:
  chess_stats_pgdata: